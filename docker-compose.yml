services:
  # Service développement (hot reload)
  # Usage: docker compose --profile dev up dev
  dev:
    image: node:22-alpine
    working_dir: /app
    command: npm run dev
    ports:
      - '3001:3001'
    env_file:
      - .env
    volumes:
      - .:/app
      - tools_node_modules:/app/node_modules
    profiles:
      - dev

  # Service utilitaire pour les commandes npm (npm install, drizzle-kit, etc.)
  # Usage: docker compose run --rm tools npm install
  tools:
    image: node:22-alpine
    working_dir: /app
    env_file:
      - .env
    volumes:
      - .:/app
      - tools_node_modules:/app/node_modules
    profiles:
      - tools

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@db:5432/stayup_auth
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3001}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      STAYUP_API_URL: ${STAYUP_API_URL}
      NEXT_PUBLIC_STAYUP_API_URL: ${NEXT_PUBLIC_STAYUP_API_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: stayup_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata_auth:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d stayup_auth']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata_auth:
  tools_node_modules:
