name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/stayup_auth_test
  BETTER_AUTH_SECRET_TEST: ci-test-secret-32-chars-minimum!!

jobs:
  # ── Lint & Format ─────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

  # ── Unit Tests ────────────────────────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit
        env:
          DATABASE_URL: ${{ env.DATABASE_URL_TEST }}
          BETTER_AUTH_SECRET: ${{ env.BETTER_AUTH_SECRET_TEST }}
          NEXT_PUBLIC_STAYUP_API_URL: http://localhost:3000

  # ── Integration Tests ─────────────────────────────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: stayup_auth_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply DB schema
        run: npx drizzle-kit push --force
        env:
          DATABASE_URL: ${{ env.DATABASE_URL_TEST }}

      - name: Run integration tests
        run: npm run test:integration
        env:
          DATABASE_URL: ${{ env.DATABASE_URL_TEST }}
          BETTER_AUTH_SECRET: ${{ env.BETTER_AUTH_SECRET_TEST }}
          NEXT_PUBLIC_STAYUP_API_URL: http://localhost:3000

  # ── Build ─────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-integration]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: ${{ env.DATABASE_URL_TEST }}
          BETTER_AUTH_SECRET: ${{ env.BETTER_AUTH_SECRET_TEST }}
          BETTER_AUTH_URL: http://localhost:3001
          STAYUP_API_URL: ${{ secrets.STAYUP_API_URL }}
          STAYUP_API_USERNAME: ${{ secrets.STAYUP_API_USERNAME }}
          STAYUP_API_PASSWORD: ${{ secrets.STAYUP_API_PASSWORD }}
          NEXT_PUBLIC_STAYUP_API_URL: ${{ secrets.STAYUP_API_URL }}

  # ── E2E Tests ─────────────────────────────────────────────────────────────────
  test-e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: stayup_auth_e2e
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Apply DB schema
        run: npx drizzle-kit push --force
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stayup_auth_e2e

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stayup_auth_e2e
          BETTER_AUTH_SECRET: ${{ env.BETTER_AUTH_SECRET_TEST }}
          BETTER_AUTH_URL: http://localhost:3001
          STAYUP_API_URL: ${{ secrets.STAYUP_API_URL }}
          STAYUP_API_USERNAME: ${{ secrets.STAYUP_API_USERNAME }}
          STAYUP_API_PASSWORD: ${{ secrets.STAYUP_API_PASSWORD }}
          NEXT_PUBLIC_STAYUP_API_URL: ${{ secrets.STAYUP_API_URL }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
